version: '3.8'

services:
  api:
    build:
      context: ./restaurant-platform-api
      dockerfile: Dockerfile
    container_name: gros-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - QR_SECRET=${QR_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gros-network

  web:
    build:
      context: ./restaurant-platform-web
      dockerfile: Dockerfile
    container_name: gros-web
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL}/api/v1
      - NEXT_PUBLIC_WS_URL=${API_URL}
    depends_on:
      - api
    networks:
      - gros-network

  postgres:
    image: postgres:15-alpine
    container_name: gros-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    environment:
      - POSTGRES_DB=restaurantos
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gros-network

  redis:
    image: redis:7-alpine
    container_name: gros-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gros-network

  nginx:
    image: nginx:alpine
    container_name: gros-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - gros-network

volumes:
  postgres_data:
  redis_data:

networks:
  gros-network:
    driver: bridge
